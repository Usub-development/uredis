version: "3.9"

services:
  redis-7000:
    image: redis:7-alpine
    container_name: redis-7000
    hostname: redis-7000
    restart: unless-stopped
    networks: [ redis-cluster ]
    ports:
      - "7000:6379"
      - "17000:16379"
    volumes:
      - redis-7000-data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - /data/nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --protected-mode
      - "no"
      - --bind
      - 0.0.0.0
      - --port
      - "6379"
      - --requirepass
      - redispass
      - --masterauth
      - redispass
      - --cluster-announce-hostname
      - redis-7000
      - --cluster-announce-port
      - "6379"
      - --cluster-announce-bus-port
      - "16379"

